services:
  postgres:
    image: postgres:16-alpine
    container_name: keystone-test-db
    environment:
      POSTGRES_USER: keystone_test
      POSTGRES_PASSWORD: keystone_test
      POSTGRES_DB: keystone_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone_test"]
      interval: 2s
      timeout: 5s
      retries: 20
